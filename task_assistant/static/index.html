<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Assistant</title>
  <link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔧 Task Assistant</h1>
      <div class="header-actions">
        <button id="btn-add-pr" class="btn-pr">● PR Monitor</button>
        <button id="btn-add-reminder" class="btn-reminder">⏰ Reminder</button>
      </div>
    </header>

    <div id="quick-create" class="quick-create hidden">
      <div class="qc-row">
        <span id="qc-badge" class="task-type"></span>
        <input type="text" id="qc-input" autocomplete="off">
        <button type="button" id="qc-close" class="qc-close" title="Cancel">✕</button>
      </div>
      <div id="qc-time-row" class="qc-row hidden">
        <span id="qc-time-label" class="qc-label">Minutes</span>
        <input type="number" id="qc-time" min="1" value="30">
        <span class="qc-hint">Enter to create</span>
      </div>
    </div>

    <section id="active-section">
      <h2>Active Tasks</h2>
      <div id="active-tasks" class="task-list"></div>
      <p id="no-active" class="empty-msg">No active tasks</p>
    </section>

    <section id="breaking-section">
      <div class="section-header">
        <h2 class="collapsible" onclick="const b=document.getElementById('breaking-body');b.classList.toggle('hidden');document.getElementById('breaking-arrow').textContent=b.classList.contains('hidden')?'▶':'▼'">
          <span id="breaking-arrow">▼</span> Breaking Change PRs
        </h2>
        <button class="btn-clear" onclick="loadBreakingPRs()" title="Refresh">⟳</button>
      </div>
      <div id="breaking-body">
        <div id="breaking-prs" class="task-list"></div>
        <p id="no-breaking" class="empty-msg">Loading...</p>
      </div>
    </section>

    <section id="history-section">
      <div class="section-header">
        <h2 class="collapsible" onclick="const b=document.getElementById('history-body');b.classList.toggle('hidden');document.getElementById('history-arrow').textContent=b.classList.contains('hidden')?'▶':'▼'">
          <span id="history-arrow">▶</span> History
        </h2>
        <button class="btn-clear" onclick="clearHistory()">Clear</button>
      </div>
      <div id="history-body" class="hidden">
        <div id="history-tasks" class="task-list"></div>
        <p id="no-history" class="empty-msg">No history</p>
      </div>
    </section>
  </div>

  <script src="/static/app.js?v=4"></script>
</body>
</html>
